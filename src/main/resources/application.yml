spring:
  application:
    name: tresors-haute-bretagne
  
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/tresors_db
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    initialization-mode: always
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  
  sql:
    init:
      mode: always
      platform: postgresql
      data-locations: classpath:data.sql
      encoding: UTF-8

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

spring:
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:TresorsHauteBretagne_SecretKey_MustBe32CharsMinimum!2024}
    expiration: 604800000        # 7 jours
    refresh-expiration: 7776000000  # 90 jours
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}

logging:
  level:
    root: INFO
    com.tresorshautebretagne: DEBUG
    org.springframework.web: INFO
