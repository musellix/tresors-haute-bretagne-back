services:

  postgres:
    image: postgres:16-alpine
    container_name: tresors-postgres
    environment:
      POSTGRES_DB: tresors_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: tresors-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: TresorsHauteBretagne_SecretKey_MustBe32CharsMinimum!2024
      FRONTEND_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ""
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
    ports:
      - "8080:8080"
    restart: on-failure

volumes:
  postgres_data:
